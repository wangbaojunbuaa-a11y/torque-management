name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build torque workstation exe
        run: pyinstaller -F -w main.py --name IGBT_Torque_Manager

      - name: Build report center exe
        run: pyinstaller -F -w report_center_main.py --name IGBT_Torque_Report_Center --add-data "涂敷拧紧记录表-模板.xlsx;."

      - name: Build coating record exe
        run: pyinstaller -F -w coating_main.py --name Coating_Record_Manager

      - name: Upload torque workstation artifact
        uses: actions/upload-artifact@v4
        with:
          name: IGBT_Torque_Manager
          path: dist/IGBT_Torque_Manager.exe

      - name: Upload report center artifact
        uses: actions/upload-artifact@v4
        with:
          name: IGBT_Torque_Report_Center
          path: dist/IGBT_Torque_Report_Center.exe

      - name: Upload coating record artifact
        uses: actions/upload-artifact@v4
        with:
          name: Coating_Record_Manager
          path: dist/Coating_Record_Manager.exe
